services:
  - type: web
    name: pinecone-compass
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Secrets — set these in the Render dashboard, not in git.
      - key: PINECONE_API
        sync: false
      - key: APP_PASSWORD
        sync: false
      # Non-secret config
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: APP_USER
        value: admin
      # IP allowlist: comma-separated IPs / IPv4 CIDR ranges. Only these IPs
      # can reach the app. Update in the Render dashboard if your IP changes.
      - key: ALLOWED_IPS
        value: 208.127.30.50
